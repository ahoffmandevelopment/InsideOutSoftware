name: Trigger auto deployment for insideoutsoftware

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/insideoutsoftware-AutoDeployTrigger-47d1610c-5c5e-4ee8-a722-b530ae73f424.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo
      packages: write #Required to push container images to GHCR

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.INSIDEOUTSOFTWARE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.INSIDEOUTSOFTWARE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.INSIDEOUTSOFTWARE_AZURE_SUBSCRIPTION_ID }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/ahoffmandevelopment/insideoutsoftware:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Deploy container image to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: insideoutsoftware
          resourceGroup: insideout-rg
          registryUrl: ghcr.io
          imageToDeploy: ghcr.io/ahoffmandevelopment/insideoutsoftware:${{ github.sha }}
          targetPort: 8080

      - name: Collect Azure cloud build temp logs
        if: failure()
        shell: bash
        run: |
          set -uo pipefail
          LOG_DIR="$RUNNER_TEMP/azure-cloud-build-logs"
          mkdir -p "$LOG_DIR"

          find /tmp -maxdepth 1 -type f -name 'build*.txt' -print -exec cp {} "$LOG_DIR"/ \;

          shopt -s nullglob
          files=("$LOG_DIR"/build*.txt)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No Azure cloud build temp logs found under /tmp"
            exit 0
          fi

          for file in "${files[@]}"; do
            echo "::group::$(basename "$file")"
            cat "$file"
            echo "::endgroup::"
          done

      - name: Upload Azure cloud build temp logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: azure-cloud-build-temp-logs
          path: ${{ runner.temp }}/azure-cloud-build-logs/build*.txt
          if-no-files-found: warn


