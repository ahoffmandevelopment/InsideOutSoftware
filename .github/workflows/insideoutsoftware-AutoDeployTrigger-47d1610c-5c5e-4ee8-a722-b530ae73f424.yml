name: Trigger auto deployment for insideoutsoftware

on:
  push:
    branches:
      [ main ]

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.INSIDEOUTSOFTWARE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.INSIDEOUTSOFTWARE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.INSIDEOUTSOFTWARE_AZURE_SUBSCRIPTION_ID }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/ahoffmandevelopment/insideoutsoftware:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Deploy container image to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: insideoutsoftware
          resourceGroup: insideout-rg
          registryUrl: ghcr.io
          imageToDeploy: ghcr.io/ahoffmandevelopment/insideoutsoftware:${{ github.sha }}
          targetPort: 8080


