name: Trigger auto deployment for insideoutsoftware

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/insideoutsoftware-AutoDeployTrigger-47d1610c-5c5e-4ee8-a722-b530ae73f424.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.INSIDEOUTSOFTWARE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.INSIDEOUTSOFTWARE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.INSIDEOUTSOFTWARE_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          registryUrl: 
          registryUsername: ${{ secrets.INSIDEOUTSOFTWARE_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.INSIDEOUTSOFTWARE_REGISTRY_PASSWORD }}
          containerAppName: insideoutsoftware
          resourceGroup: insideout-rg
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}


